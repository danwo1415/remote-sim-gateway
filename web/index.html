<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote SIM Gateway</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --danger: #dc2626;
      --success: #16a34a;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 42px;
    }
    .topbar, .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .topbar {
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 22px;
    }
    .title { font-size: 22px; font-weight: 750; }
    .subtitle { margin-top: 6px; color: var(--muted); font-size: 13px; }
    .status-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .pill {
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 11px;
      background: #fff;
      white-space: nowrap;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--danger);
      margin-right: 6px;
    }
    .dot.online { background: var(--success); }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .module-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 26px;
      min-height: 170px;
      box-shadow: var(--shadow);
      position: relative;
    }
    .module-icon {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      background: #eff6ff;
      color: var(--primary);
      display: grid;
      place-items: center;
      font-size: 23px;
      margin-bottom: 20px;
    }
    .module-title { font-size: 24px; font-weight: 760; }
    .module-desc { color: var(--muted); margin-top: 8px; font-size: 14px; }
    .badge {
      position: absolute;
      top: 22px;
      right: 22px;
      min-width: 36px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      padding: 0 9px;
      font-size: 13px;
      font-weight: 760;
      color: #fff;
      background: var(--danger);
    }
    .badge.sms { background: var(--primary); }
    .card { padding: 18px 20px; margin-bottom: 18px; }
    .status-line { line-height: 1.8; font-size: 14px; }
    .muted { color: var(--muted); }
    .sms-panel { margin-top: 18px; }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .section-title { font-size: 18px; font-weight: 760; }
    .refresh-button {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font: inherit;
    }
    .refresh-button:hover { border-color: var(--primary); color: var(--primary); }
    .sms-list { display: grid; gap: 10px; }
    .sms-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }
    .sms-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .sms-from { color: var(--text); font-weight: 700; }
    .sms-body { white-space: pre-wrap; word-break: break-word; line-height: 1.55; font-size: 14px; }
    .sms-empty { color: var(--muted); padding: 12px 0; }
    @media (max-width: 520px) and (orientation: portrait) {
      .app { padding: 14px 12px 28px; }
      .topbar { align-items: flex-start; flex-direction: column; padding: 15px; margin-bottom: 14px; }
      .status-row { width: 100%; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .pill { text-align: center; font-size: 12px; }
      .grid { grid-template-columns: 1fr; gap: 12px; }
      .module-card {
        min-height: 116px;
        padding: 18px;
        border-radius: 18px;
        display: grid;
        grid-template-columns: 48px 1fr;
        column-gap: 14px;
        align-items: center;
      }
      .module-icon { margin-bottom: 0; }
      .module-title { font-size: 21px; }
      .module-desc { font-size: 12px; }
      .badge { top: 14px; right: 14px; }
      .section-head { align-items: flex-start; flex-direction: column; }
      .refresh-button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div>
        <div class="title">Remote SIM Gateway</div>
        <div class="subtitle">极简网页控制台 · SIM 插在 Android 手机上</div>
      </div>
      <div class="status-row">
        <div class="pill"><span id="deviceDot" class="dot"></span><span id="deviceText">Device Offline</span></div>
        <div class="pill">SIM Gateway</div>
        <div class="pill">M1 Device Online</div>
      </div>
    </section>

    <section class="card">
      <div class="status-line"><strong>Device ID：</strong><span id="deviceId" class="muted">-</span></div>
      <div class="status-line"><strong>Connected At：</strong><span id="connectedAt" class="muted">-</span></div>
      <div class="status-line"><strong>Last Seen：</strong><span id="lastSeenAt" class="muted">-</span></div>
    </section>

    <section class="grid">
      <div class="module-card">
        <div id="smsCount" class="badge sms">0</div>
        <div class="module-icon">✉️</div>
        <div>
          <div class="module-title">接收短信</div>
          <div id="smsSummary" class="module-desc">正在读取短信</div>
        </div>
      </div>

      <div class="module-card">
        <div class="module-icon">➤</div>
        <div>
          <div class="module-title">发送短信</div>
          <div class="module-desc">M3 开始接入发送指令</div>
        </div>
      </div>

      <div class="module-card">
        <div class="badge">0</div>
        <div class="module-icon">☎️</div>
        <div>
          <div class="module-title">接听电话</div>
          <div class="module-desc">M4 开始接入来电状态</div>
        </div>
      </div>

      <div class="module-card">
        <div class="module-icon">⌕</div>
        <div>
          <div class="module-title">拨打电话</div>
          <div class="module-desc">M5 开始接入拨号指令</div>
        </div>
      </div>
    </section>

    <section class="card sms-panel">
      <div class="section-head">
        <div>
          <div class="section-title">接收短信</div>
          <div id="smsListStatus" class="muted">正在读取短信</div>
        </div>
        <button id="refreshSmsButton" class="refresh-button" type="button">刷新</button>
      </div>
      <div id="smsList" class="sms-list"></div>
    </section>
  </main>

  <script>
    async function refreshDeviceStatus() {
      try {
        const res = await fetch('/api/device/status', { cache: 'no-store' });
        const data = await res.json();

        const online = Boolean(data.online);
        document.getElementById('deviceDot').classList.toggle('online', online);
        document.getElementById('deviceText').textContent = online ? 'Device Online' : 'Device Offline';
        document.getElementById('deviceId').textContent = data.deviceId || '-';
        document.getElementById('connectedAt').textContent = data.connectedAt || '-';
        document.getElementById('lastSeenAt').textContent = data.lastSeenAt || '-';
      } catch (error) {
        document.getElementById('deviceDot').classList.remove('online');
        document.getElementById('deviceText').textContent = 'Server Offline';
      }
    }

    async function refreshSmsMessages() {
      const smsCount = document.getElementById('smsCount');
      const smsSummary = document.getElementById('smsSummary');
      const smsListStatus = document.getElementById('smsListStatus');
      const smsList = document.getElementById('smsList');

      try {
        const res = await fetch('/api/sms?limit=50', { cache: 'no-store' });
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        const messages = Array.isArray(data.messages) ? data.messages : [];

        smsCount.textContent = String(data.count ?? messages.length);
        smsSummary.textContent = messages.length ? `${messages.length} 条短信` : '暂无短信';
        smsListStatus.textContent = messages.length ? `最近 ${messages.length} 条` : '暂无短信';
        renderSmsMessages(messages);
      } catch (error) {
        smsSummary.textContent = '读取失败';
        smsListStatus.textContent = '短信读取失败';
        smsList.replaceChildren();
      }
    }

    function renderSmsMessages(messages) {
      const smsList = document.getElementById('smsList');
      smsList.replaceChildren();

      if (messages.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'sms-empty';
        empty.textContent = '暂无短信';
        smsList.appendChild(empty);
        return;
      }

      for (const message of messages) {
        const item = document.createElement('article');
        item.className = 'sms-item';

        const meta = document.createElement('div');
        meta.className = 'sms-meta';

        const from = document.createElement('span');
        from.className = 'sms-from';
        from.textContent = message.from || 'unknown';

        const time = document.createElement('span');
        time.textContent = formatSmsTime(message.receivedAt || message.timestamp);

        const body = document.createElement('div');
        body.className = 'sms-body';
        body.textContent = message.body || '';

        meta.append(from, time);
        item.append(meta, body);
        smsList.appendChild(item);
      }
    }

    function formatSmsTime(value) {
      if (!value) return '-';

      const date = typeof value === 'number' ? new Date(value) : new Date(String(value));
      if (Number.isNaN(date.getTime())) return '-';

      return date.toLocaleString('zh-CN', { hour12: false });
    }

    refreshDeviceStatus();
    refreshSmsMessages();
    document.getElementById('refreshSmsButton').addEventListener('click', refreshSmsMessages);
    setInterval(refreshDeviceStatus, 3000);
    setInterval(refreshSmsMessages, 5000);
  </script>
</body>
</html>
